name: Sync to HuggingFace

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: "0"
          lfs: "true"

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: "${{ secrets.HF_TOKEN }}"
        run: |
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/jkhancock/jkhancock/NLtodtSearch
          git push hf main --force
